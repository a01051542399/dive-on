workflows:
  ios-release:
    name: iOS Release (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: nos-divers-web
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      # Apple 이 2026-04 이후 iOS 26 SDK 강제 (Xcode 26+ 필요)
      xcode: latest
      groups:
        - code_signing
        - supabase
      vars:
        BUNDLE_ID: "com.diveon.app"
        APP_STORE_CONNECT_APP_ID: "6766769694"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
          # Ensure SPM core version matches installed plugins (8.0.1)
          CORE_VERSION=$(node -e "console.log(require('@capacitor/core/package.json').version)")
          echo "Capacitor core version: $CORE_VERSION"
          sed -i '' "s/exact: \"[0-9]*\.[0-9]*\.[0-9]*\"/exact: \"$CORE_VERSION\"/" ios/App/CapApp-SPM/Package.swift
          cat ios/App/CapApp-SPM/Package.swift | grep exact
          # Resolve SPM dependencies
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -resolvePackageDependencies

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_CONNECT_APP_ID" || echo 0)
          NEW_BUILD=$(($LATEST_BUILD + 1))
          # Ensure build number is always higher than any failed upload
          if [ "$NEW_BUILD" -le 5 ]; then NEW_BUILD=6; fi
          echo "Setting build number to $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/xcarchive/*.xcarchive/**
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - a01051542399@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: nos-divers-web
    environment:
      node: 22
      # capacitor-android 가 Java 21 source release 요구
      java: 21
      groups:
        - supabase
        - android_signing
      vars:
        PACKAGE_NAME: "com.diveon.app"
        KEYSTORE_PATH: $CM_BUILD_DIR/nos-divers-web/android/app/upload-keystore.jks
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > "$KEYSTORE_PATH"
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
          ls -la android/app/upload-keystore.jks

      - name: Increment version code
        script: |
          # 매 빌드마다 versionCode 를 단조 증가 (Play Console 요구사항)
          # 분 단위 timestamp 기반 → 절대 충돌 없음. 기존 Play Console versionCode 1
          # 보다 항상 큼.
          # 2026-01-01 00:00 KST 이후 경과 분 = 약 5.6M (10 자리 → Android 한계 2.1B 내)
          BASE_EPOCH=1767225600  # 2026-01-01 00:00 UTC
          NEW_VC=$(( ($(date +%s) - BASE_EPOCH) / 60 ))
          echo "Setting versionCode = $NEW_VC"
          # macOS BSD sed 는 -i 에 빈 인자 필수. 임시 파일 우회 방식이 가장 호환적.
          sed "s/versionCode [0-9]*/versionCode $NEW_VC/" android/app/build.gradle > android/app/build.gradle.new
          mv android/app/build.gradle.new android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

    artifacts:
      - nos-divers-web/android/app/build/outputs/bundle/release/*.aab
      - nos-divers-web/android/app/build/outputs/apk/release/*.apk
      - nos-divers-web/android/app/build/outputs/mapping/release/mapping.txt
      - "**/*.aab"
      - "**/*.apk"

    publishing:
      email:
        recipients:
          - a01051542399@gmail.com
        notify:
          success: true
          failure: true
      # Play Console 자동 업로드는 Service Account 셋업 후 활성화:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
